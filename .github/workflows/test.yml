name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - "*.*.*"
      - "main"
      - "master"
  pull_request:
    branches: "*"

permissions:
  contents: read

jobs:
  test:
    name: Test Changes (Shard ${{ matrix.shard }}/${{ matrix.total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-modules-

      - name: Install Dependencies
        run: npm install

      - name: Run Vitest
        run: npm run test:ci -- --shard=${{ matrix.shard }}/${{ matrix.total }}

      - name: Coveralls GitHub Action
        if: always()
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          file: coverage/lcov.info
          flag-name: shard-${{ matrix.shard }}
          parallel: true

  coveralls-finish:
    name: Coveralls Finish
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          parallel-finished: true
